<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fooocus2025 — Asset Browser</title>
<style>
  /* ---- M2b: 4 tabs, vanilla styles. M3 swaps the click-thru for PhotoSwipe. ---- */
  :root {
    --bg: #121212;
    --panel: #1c1c1c;
    --border: #2c2c2c;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #bb86fc;
    --accent-2: #4ecdc4;
    --warn: #c80;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100vh; overflow: hidden;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 500; }
  header h1 .badge {
    margin-left: 10px; padding: 2px 8px; border-radius: 4px;
    background: #333; color: var(--muted); font-size: 11px;
  }
  nav.tabs { display: flex; gap: 4px; }
  nav.tabs button {
    background: transparent; color: var(--text);
    border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px;
  }
  nav.tabs button:hover { background: #2a2a2a; }
  nav.tabs button.active { background: var(--accent); color: #000; border-color: var(--accent); }
  nav.tabs button[disabled] { opacity: 0.4; cursor: not-allowed; }
  .layout {
    display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 53px);
  }
  aside {
    background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 8px;
  }
  aside h3 {
    margin: 8px 8px 4px; font-size: 11px; text-transform: uppercase;
    color: var(--muted); letter-spacing: 0.05em;
  }
  aside .item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-radius: 4px; cursor: pointer;
    color: var(--text); font-size: 13px;
  }
  aside .item:hover { background: #2a2a2a; }
  aside .item.active { background: var(--accent); color: #000; }
  aside .item .count { font-size: 11px; opacity: 0.7; }
  aside .item.today { font-weight: bold; }
  aside .item.today::before { content: '● '; color: var(--accent-2); }
  main { overflow-y: auto; padding: 12px; }
  main .grid {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  }
  main .card {
    display: block; aspect-ratio: 1 / 1; background: #000; border-radius: 6px;
    overflow: hidden; text-decoration: none; position: relative; color: inherit;
  }
  main .card img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.2s ease;
  }
  main .card:hover img { transform: scale(1.04); }
  main .card .label {
    position: absolute; left: 6px; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.7); color: #fff; padding: 3px 6px;
    font-size: 10px; border-radius: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  main .card .badges {
    position: absolute; top: 6px; right: 6px;
    display: flex; gap: 4px;
  }
  main .card .badges span {
    background: rgba(0,0,0,0.65); color: var(--accent-2);
    padding: 1px 5px; border-radius: 3px; font-size: 10px;
  }
  main .card.placeholder { outline: 1px dashed var(--border); }
  main .card.negative .badges span { color: #ff8a8a; }
  .empty {
    color: var(--muted); padding: 40px; text-align: center; font-size: 14px;
  }
  .empty code { background: #222; padding: 2px 6px; border-radius: 3px; }
  footer {
    position: absolute; bottom: 0; right: 0; padding: 4px 10px;
    color: var(--muted); font-size: 10px;
  }
</style>
</head>
<body>
<header>
  <h1>🖼️ Fooocus2025 — Asset Browser <span class="badge" id="badge-status">M2b · outputs + models</span></h1>
  <nav class="tabs" id="tabs">
    <button class="active" data-tab="outputs">📅 Outputs</button>
    <button data-tab="loras">🎨 LoRAs</button>
    <button data-tab="checkpoints">📦 Models</button>
    <button data-tab="embeddings">🧩 Embeddings</button>
  </nav>
</header>

<div class="layout">
  <aside id="sidebar">
    <h3 id="sidebar-title">Days</h3>
    <div id="sidebar-list"><div class="empty">Loading…</div></div>
  </aside>
  <main>
    <div id="main-area"><div class="empty">Pick an item on the left.</div></div>
  </main>
</div>
<footer id="footer"></footer>

<script>
(() => {
  'use strict';

  /**
   * M2b SPA: vanilla JS, no deps. 4 tabs (Outputs + LoRAs + Models + Embeddings).
   * Reads JSON manifests written by modules/gallery_writer.py and
   * modules/model_indexer.py. M3 will swap click-thru behaviour for a
   * PhotoSwipe lightbox with metadata sidebar + Deep Zoom.
   */

  const $tabs = document.getElementById('tabs');
  const $sidebarTitle = document.getElementById('sidebar-title');
  const $sidebarList = document.getElementById('sidebar-list');
  const $main = document.getElementById('main-area');
  const $footer = document.getElementById('footer');

  const fmtCount = (n, singular, plural) =>
    `${n} ${n === 1 ? singular : (plural || singular + 's')}`;
  const fmtBytes = b => {
    if (b == null) return '';
    const u = ['B', 'KB', 'MB', 'GB']; let i = 0; let v = b;
    while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
    return v.toFixed(v < 10 ? 1 : 0) + ' ' + u[i];
  };
  const escapeHtml = s => String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  async function fetchJson(path) {
    try {
      const r = await fetch(path, { cache: 'no-store' });
      if (!r.ok) return null;
      return await r.json();
    } catch (e) { return null; }
  }

  function renderEmpty(target, msg) { target.innerHTML = `<div class="empty">${msg}</div>`; }

  // ---------------------- OUTPUTS TAB ----------------------

  const Outputs = {
    days: [],
    today: null,
    activeDate: null,

    async init() {
      $sidebarTitle.textContent = 'Days';
      const idx = await fetchJson('./_index/days.json');
      if (!idx) {
        renderEmpty($sidebarList, 'No <code>_index/days.json</code>.');
        renderEmpty($main, 'Asset Browser has not built its outputs index yet.<br><br>'
          + 'In Fooocus go to <b>Advanced → 🖼️ Asset Browser</b> and click '
          + '<code>🔄 Reindex everything now</code>, or generate a new image.');
        return;
      }
      this.days = idx.days || [];
      this.today = idx.today;
      this.renderSidebar();
      const initial = this.days.find(d => d.date === this.today) || this.days[0];
      if (initial) this.loadDay(initial.date);
      else renderEmpty($main, '<b>No days yet.</b>');
    },

    renderSidebar() {
      if (this.days.length === 0) { renderEmpty($sidebarList, 'No days indexed.'); return; }
      $sidebarList.innerHTML = this.days.map(d => `
        <div class="item${d.date === this.today ? ' today' : ''}${d.date === this.activeDate ? ' active' : ''}" data-date="${escapeHtml(d.date)}">
          <span>${escapeHtml(d.date)}</span><span class="count">${d.count}</span>
        </div>`).join('');
      $sidebarList.querySelectorAll('.item').forEach(el =>
        el.addEventListener('click', () => this.loadDay(el.dataset.date)));
    },

    async loadDay(date) {
      this.activeDate = date;
      this.renderSidebar();
      const manifest = await fetchJson(`./${date}/manifest.json`);
      if (!manifest || !manifest.images || manifest.images.length === 0) {
        renderEmpty($main, `No manifest for ${date} yet.`);
        return;
      }
      $main.innerHTML = `<div class="grid">${manifest.images.map(img => {
        const thumb = img.thumb || img.src;
        return `<a class="card" href="./${date}/${encodeURIComponent(img.src)}" target="_blank" title="${escapeHtml(img.src)}">
          <img loading="lazy" src="./${date}/${encodeURIComponent(thumb)}" alt="">
          <div class="label">${escapeHtml(img.src)}</div>
        </a>`;
      }).join('')}</div>`;
      $footer.textContent = `${date} — ${fmtCount(manifest.images.length, 'image')}`;
    },
  };

  // ---------------------- MODELS TABS (loras / checkpoints / embeddings) ----------------------

  function buildModelsTab(kind, opts) {
    return {
      kind,
      file: `./_index/${kind}.json`,
      items: [],
      subfolders: [],
      activeSubfolder: '__all__',

      async init() {
        $sidebarTitle.textContent = opts.sidebarTitle;
        const idx = await fetchJson(this.file);
        if (!idx || !idx.items || idx.items.length === 0) {
          renderEmpty($sidebarList, `No <code>${kind}.json</code> yet.`);
          renderEmpty($main, `<b>${opts.emptyTitle}</b><br><br>`
            + 'Click <code>🔄 Reindex everything now</code> in Fooocus → '
            + 'Advanced → 🖼️ Asset Browser to scan your <code>'
            + opts.modelsDir + '</code> folder.');
          return;
        }
        this.items = idx.items;
        this.subfolders = this.computeSubfolders();
        this.renderSidebar();
        this.renderGrid();
        $footer.textContent = `${fmtCount(this.items.length, opts.unit)} indexed at ${idx.generated_at || '?'}`;
      },

      computeSubfolders() {
        const counts = new Map();
        for (const it of this.items) {
          const f = it.subfolder || '.';
          counts.set(f, (counts.get(f) || 0) + 1);
        }
        return Array.from(counts.entries())
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => a.name.localeCompare(b.name));
      },

      renderSidebar() {
        const total = this.items.length;
        const head = `<div class="item${this.activeSubfolder === '__all__' ? ' active' : ''}" data-sub="__all__">
            <span>All</span><span class="count">${total}</span></div>`;
        const rest = this.subfolders.map(sf => {
          const label = sf.name === '.' ? '(root)' : sf.name;
          return `<div class="item${this.activeSubfolder === sf.name ? ' active' : ''}" data-sub="${escapeHtml(sf.name)}">
            <span>${escapeHtml(label)}</span><span class="count">${sf.count}</span></div>`;
        }).join('');
        $sidebarList.innerHTML = head + rest;
        $sidebarList.querySelectorAll('.item').forEach(el => {
          el.addEventListener('click', () => {
            this.activeSubfolder = el.dataset.sub;
            this.renderSidebar();
            this.renderGrid();
          });
        });
      },

      renderGrid() {
        const filtered = this.activeSubfolder === '__all__'
          ? this.items
          : this.items.filter(it => (it.subfolder || '.') === this.activeSubfolder);
        if (filtered.length === 0) { renderEmpty($main, 'Nothing in this subfolder.'); return; }
        $main.innerHTML = `<div class="grid">${filtered.map(it => this.renderCard(it)).join('')}</div>`;
      },

      renderCard(it) {
        const previewSrc = it.preview ? `./${it.preview}` : '';
        const cardClasses = ['card'];
        if (it.preview_kind === 'placeholder') cardClasses.push('placeholder');
        if (it.is_negative_hint) cardClasses.push('negative');

        const badges = [];
        if (it.trigger_words && it.trigger_words.length) {
          badges.push(`<span title="${escapeHtml(it.trigger_words.join(', '))}">⚡ ${it.trigger_words.length}</span>`);
        }
        if (it.civitai_url) badges.push(`<span title="On CivitAI">🔗</span>`);
        if (it.is_negative_hint) badges.push(`<span title="Likely a negative-prompt embedding">−</span>`);
        if (it.civitai_consensus) badges.push(`<span title="Has CivitAI consensus settings">📊</span>`);

        const label = it.filename;
        const sizeStr = it.size_bytes != null ? ` · ${fmtBytes(it.size_bytes)}` : '';
        const titleAttr = `${it.rel_path}${sizeStr}`
          + (it.trigger_words && it.trigger_words.length ? `\nTriggers: ${it.trigger_words.join(', ')}` : '')
          + (it.civitai_url ? `\nCivitAI: ${it.civitai_url}` : '');

        const href = it.civitai_url || (it.preview ? `./${it.preview}` : '#');
        const target = it.civitai_url ? '_blank' : '_blank';

        return `<a class="${cardClasses.join(' ')}" href="${escapeHtml(href)}" target="${target}" title="${escapeHtml(titleAttr)}">
          ${previewSrc
            ? `<img loading="lazy" src="${escapeHtml(previewSrc)}" alt="">`
            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#444">no preview</div>`}
          ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
          <div class="label">${escapeHtml(label)}</div>
        </a>`;
      },
    };
  }

  const tabs = {
    outputs: Outputs,
    loras: buildModelsTab('loras', {
      sidebarTitle: 'Subfolders', emptyTitle: 'No LoRAs indexed',
      modelsDir: 'models/loras/', unit: 'LoRA',
    }),
    checkpoints: buildModelsTab('checkpoints', {
      sidebarTitle: 'Subfolders', emptyTitle: 'No checkpoints indexed',
      modelsDir: 'models/checkpoints/', unit: 'checkpoint',
    }),
    embeddings: buildModelsTab('embeddings', {
      sidebarTitle: 'Subfolders', emptyTitle: 'No embeddings indexed',
      modelsDir: 'models/embeddings/', unit: 'embedding',
    }),
  };

  function setActiveTab(name) {
    $tabs.querySelectorAll('button').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === name));
    if (window.location.hash.replace('#', '') !== name) {
      history.replaceState(null, '', '#' + name);
    }
    if (tabs[name]) tabs[name].init();
  }

  $tabs.querySelectorAll('button').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', () => setActiveTab(b.dataset.tab));
  });

  // Initial tab from URL hash, fallback to outputs.
  const initial = (window.location.hash || '#outputs').replace('#', '');
  setActiveTab(tabs[initial] ? initial : 'outputs');
})();
</script>
</body>
</html>
