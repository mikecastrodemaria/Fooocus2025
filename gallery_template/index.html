<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fooocus2025 — Asset Browser</title>
<link rel="stylesheet" href="_assets/photoswipe.css" />
<link rel="stylesheet" href="_assets/photoswipe-dynamic-caption-plugin.css" />
<style>
  /* M3 final: 4 tabs + PhotoSwipe lightbox + Dynamic Caption sidebar + Deep Zoom. */
  :root {
    --bg: #121212;
    --panel: #1c1c1c;
    --border: #2c2c2c;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #bb86fc;
    --accent-2: #4ecdc4;
    --warn: #c80;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100vh; overflow: hidden;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 500; }
  header h1 .badge {
    margin-left: 10px; padding: 2px 8px; border-radius: 4px;
    background: #333; color: var(--muted); font-size: 11px;
  }
  nav.tabs { display: flex; gap: 4px; }
  nav.tabs button {
    background: transparent; color: var(--text);
    border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px;
  }
  nav.tabs button:hover { background: #2a2a2a; }
  nav.tabs button.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .layout { display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 53px); }
  aside {
    background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 8px;
  }
  aside h3 {
    margin: 8px 8px 4px; font-size: 11px; text-transform: uppercase;
    color: var(--muted); letter-spacing: 0.05em;
  }
  aside .item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-radius: 4px; cursor: pointer;
    color: var(--text); font-size: 13px;
    position: relative;
  }
  aside .item:hover { background: #2a2a2a; }
  aside .item.active { background: var(--accent); color: #000; }
  aside .item .count { font-size: 11px; opacity: 0.7; }
  aside .item.today { font-weight: bold; }
  aside .item.today::before { content: '● '; color: var(--accent-2); }
  /* Hide/show toggle button — appears on hover. */
  aside .item .hide-btn {
    display: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.65); color: var(--text); border: 0;
    border-radius: 3px; cursor: pointer; font-size: 10px; padding: 2px 5px;
    line-height: 1.1;
  }
  aside .item:hover .hide-btn { display: inline-block; }
  aside .item:hover .count { display: none; }
  aside .item.hidden-row {
    opacity: 0.45; font-style: italic;
  }
  aside .item.hidden-row .hide-btn { display: inline-block; background: rgba(78,205,196,0.18); }

  /* Header right cluster: extra toggles + tabs. */
  header .right {
    display: flex; align-items: center; gap: 10px;
  }
  header .toggles { display: flex; gap: 4px; }
  header .toggles button {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 4px 9px; border-radius: 5px; cursor: pointer; font-size: 12px;
    line-height: 1.2;
  }
  header .toggles button:hover { background: #2a2a2a; color: var(--text); }
  header .toggles button.on {
    background: rgba(187,134,252,0.18); color: var(--accent); border-color: var(--accent);
  }
  header .toggles button .pill {
    margin-left: 4px; background: var(--accent); color: #000;
    border-radius: 8px; padding: 0 5px; font-size: 10px; font-weight: bold;
  }

  /* NSFW blur — applied to <img> inside .card; hover/click reveals. */
  body.blur-active main .card img {
    filter: blur(20px) saturate(0.7);
    transition: filter 0.18s ease;
  }
  body.blur-active main .card:hover img,
  body.blur-active main .card.unblur img {
    filter: none;
  }
  body.blur-active main .card .label::before { content: '\1F32B  '; }
  main { overflow-y: auto; padding: 12px; }
  main .grid {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  }
  main .card {
    display: block; aspect-ratio: 1 / 1; background: #000; border-radius: 6px;
    overflow: hidden; text-decoration: none; position: relative; color: inherit;
    cursor: zoom-in;
  }
  main .card img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.2s ease;
  }
  main .card:hover img { transform: scale(1.04); }
  main .card .label {
    position: absolute; left: 6px; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.7); color: #fff; padding: 3px 6px;
    font-size: 10px; border-radius: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  main .card .badges {
    position: absolute; top: 6px; right: 6px;
    display: flex; gap: 4px;
  }
  main .card .badges span {
    background: rgba(0,0,0,0.65); color: var(--accent-2);
    padding: 1px 5px; border-radius: 3px; font-size: 10px;
  }
  main .card.placeholder { outline: 1px dashed var(--border); }
  main .card.negative .badges span { color: #ff8a8a; }
  .empty { color: var(--muted); padding: 40px; text-align: center; font-size: 14px; }
  .empty code { background: #222; padding: 2px 6px; border-radius: 3px; }
  footer {
    position: absolute; bottom: 0; right: 0; padding: 4px 10px;
    color: var(--muted); font-size: 10px;
  }

  /* PhotoSwipe Dynamic Caption — our metadata sidebar styles. */
  .pswp__dynamic-caption {
    color: var(--text); background: rgba(28,28,28,0.92); border-radius: 8px;
    font-size: 14px; line-height: 1.5; padding: 18px 20px; max-width: 520px;
    border: 1px solid var(--border);
  }
  .pswp__dynamic-caption.pswp__dynamic-caption--aside { width: 440px; }
  .pswp__dynamic-caption h2 {
    margin: 0 0 10px; font-size: 16px; color: var(--accent); word-break: break-word;
    line-height: 1.3;
  }
  .pswp__dynamic-caption .meta-row {
    display: grid; grid-template-columns: 100px 1fr; gap: 6px 12px;
    margin: 6px 0; font-size: 13px;
  }
  .pswp__dynamic-caption .meta-row .k { color: var(--muted); }
  .pswp__dynamic-caption .meta-row .v {
    color: var(--text); word-break: break-word; max-height: 5em; overflow: auto;
  }
  .pswp__dynamic-caption .copy-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
    border-top: 1px solid var(--border); padding-top: 10px;
  }
  .pswp__dynamic-caption .copy-row button,
  .pswp__dynamic-caption .copy-row a {
    background: #222; color: var(--text); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer;
    text-decoration: none; display: inline-block;
  }
  .pswp__dynamic-caption .copy-row button:hover,
  .pswp__dynamic-caption .copy-row a:hover { background: #333; color: #fff; }
  .pswp__dynamic-caption .copy-row button.ok {
    background: var(--accent-2); color: #000; border-color: var(--accent-2);
  }
  /* Highlighted "Fetch from CivitAI" — call-to-action when no sidecar preview. */
  .pswp__dynamic-caption .copy-row button.fetch-civitai-btn {
    background: rgba(187,134,252,0.25); color: var(--accent);
    border-color: var(--accent); font-weight: 600;
  }
  .pswp__dynamic-caption .copy-row button.fetch-civitai-btn:hover:not(:disabled) {
    background: var(--accent); color: #000;
  }
  .pswp__dynamic-caption .copy-row button.fetch-civitai-btn:disabled {
    opacity: 0.7; cursor: wait;
  }
  .pswp__dynamic-caption .triggers, .pswp__dynamic-caption code {
    background: #111; padding: 6px 8px; border-radius: 4px; display: block;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; color: #c8b6e8; word-break: break-all;
  }
</style>
</head>
<body>
<header>
  <h1>🖼️ Fooocus2025 — Asset Browser <span class="badge" id="badge-status">M3 · PhotoSwipe lightbox</span></h1>
  <div class="right">
    <div class="toggles" id="header-toggles">
      <button id="btn-blur"        title="Blur all thumbnails (NSFW privacy). Hover or click to reveal individually.">🌫️ Blur</button>
      <button id="btn-show-hidden" title="Reveal hidden days / subfolders (use the eye-slash button on each item to hide it).">👁️ Hidden</button>
    </div>
    <nav class="tabs" id="tabs">
      <button class="active" data-tab="outputs">📅 Outputs</button>
      <button data-tab="loras">🎨 LoRAs</button>
      <button data-tab="checkpoints">📦 Models</button>
      <button data-tab="embeddings">🧩 Embeddings</button>
    </nav>
  </div>
</header>

<div class="layout">
  <aside id="sidebar">
    <h3 id="sidebar-title">Days</h3>
    <div id="sidebar-list"><div class="empty">Loading…</div></div>
  </aside>
  <main>
    <div id="main-area"><div class="empty">Pick an item on the left.</div></div>
  </main>
</div>
<footer id="footer"></footer>

<script type="module">
import PhotoSwipeLightbox from './_assets/photoswipe-lightbox.esm.js';
import PhotoSwipe from './_assets/photoswipe.esm.js';
import PhotoSwipeDynamicCaption from './_assets/photoswipe-dynamic-caption-plugin.esm.js';
import DeepZoom from './_assets/photoswipe-deep-zoom-plugin.esm.js';

/**
 * M3 SPA: 4 tabs (Outputs + LoRAs + Models + Embeddings).
 * Each tab opens a PhotoSwipe v5 lightbox on click. Dynamic Caption
 * renders a metadata sidebar (per-tab template). Deep Zoom is wired but
 * only kicks in when an item provides `dzi.tileUrl` (M3 ships without
 * DZI tile generation — Deep Zoom falls back to PhotoSwipe's regular
 * scroll/pinch zoom on the full image, which is fine for outputs and
 * model preview thumbnails).
 */

const $tabs = document.getElementById('tabs');
const $sidebarTitle = document.getElementById('sidebar-title');
const $sidebarList = document.getElementById('sidebar-list');
const $main = document.getElementById('main-area');
const $footer = document.getElementById('footer');

const fmtCount = (n, singular, plural) =>
  `${n} ${n === 1 ? singular : (plural || singular + 's')}`;
const fmtBytes = b => {
  if (b == null) return '';
  const u = ['B', 'KB', 'MB', 'GB']; let i = 0; let v = b;
  while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
  return v.toFixed(v < 10 ? 1 : 0) + ' ' + u[i];
};
const escapeHtml = s => String(s).replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtMP = (w, h) => (w && h) ? ((w * h) / 1_000_000).toFixed(2) + ' MP' : '';

async function fetchJson(path) {
  try {
    const r = await fetch(path, { cache: 'no-store' });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

function renderEmpty(target, msg) { target.innerHTML = `<div class="empty">${msg}</div>`; }

// =================== Hide / Blur state (localStorage-backed) ===================
//
// `hidden` is a per-scope set of keys (e.g. scope='outputs:days', key='2024-05-22').
// `blur` reads the SPA default from _index/spa_settings.json AND a localStorage
// override (so user can flip it temporarily on a shared machine). `showHidden`
// is a transient view mode — when ON, hidden items reappear greyed with an
// unhide button.
const LS_HIDDEN     = 'fooocus2025_assetbrowser_hidden';
const LS_BLUR_OVR   = 'fooocus2025_assetbrowser_blur_override';   // null | 'on' | 'off'
const State = {
  spaSettings: { blur_thumbnails: false },   // populated from spa_settings.json on init
  hidden: { /* "outputs:days": Set, "loras:subfolders": Set, ... */ },
  showHidden: false,
  blurActive: false,
  _hiddenChangeListeners: [],
  loadHidden() {
    try {
      const raw = localStorage.getItem(LS_HIDDEN);
      const obj = raw ? JSON.parse(raw) : {};
      this.hidden = {};
      for (const k of Object.keys(obj || {})) {
        this.hidden[k] = new Set(Array.isArray(obj[k]) ? obj[k] : []);
      }
    } catch (e) { this.hidden = {}; }
  },
  saveHidden() {
    const out = {};
    for (const k of Object.keys(this.hidden)) {
      out[k] = Array.from(this.hidden[k]);
    }
    try { localStorage.setItem(LS_HIDDEN, JSON.stringify(out)); } catch (e) {}
    for (const cb of this._hiddenChangeListeners) { try { cb(); } catch (_) {} }
  },
  isHidden(scope, key) {
    return this.hidden[scope] && this.hidden[scope].has(key);
  },
  toggleHidden(scope, key) {
    if (!this.hidden[scope]) this.hidden[scope] = new Set();
    if (this.hidden[scope].has(key)) this.hidden[scope].delete(key);
    else this.hidden[scope].add(key);
    this.saveHidden();
  },
  totalHiddenCount() {
    let n = 0;
    for (const k of Object.keys(this.hidden)) n += this.hidden[k].size;
    return n;
  },
  onHiddenChange(cb) { this._hiddenChangeListeners.push(cb); },

  effectiveBlur() {
    const ovr = localStorage.getItem(LS_BLUR_OVR);
    if (ovr === 'on') return true;
    if (ovr === 'off') return false;
    return !!this.spaSettings.blur_thumbnails;
  },
  setBlurOverride(val) {
    if (val === null) localStorage.removeItem(LS_BLUR_OVR);
    else localStorage.setItem(LS_BLUR_OVR, val ? 'on' : 'off');
    this.applyBlur();
  },
  applyBlur() {
    this.blurActive = this.effectiveBlur();
    document.body.classList.toggle('blur-active', this.blurActive);
    document.getElementById('btn-blur').classList.toggle('on', this.blurActive);
  },
};
State.loadHidden();

// Render badge "👁️ Hidden +N" + active state.
function refreshHeaderToggles() {
  const n = State.totalHiddenCount();
  const btnHidden = document.getElementById('btn-show-hidden');
  btnHidden.classList.toggle('on', State.showHidden);
  btnHidden.innerHTML = State.showHidden
    ? `\u{1F441}\u{FE0F} Hidden${n ? ` <span class="pill">${n}</span>` : ' (none)'}`
    : `\u{1F441}\u{FE0F} Hidden${n ? ` <span class="pill">${n}</span>` : ''}`;
}

// Sidebar item HTML helper — adds the hide/unhide button + greyed style.
function sidebarItemHtml(opts) {
  // opts: { scope, key, label, count, classes:[], active:bool }
  const isHidden = State.isHidden(opts.scope, opts.key);
  if (isHidden && !State.showHidden) return '';   // filtered out
  const classes = ['item', ...(opts.classes || [])];
  if (isHidden) classes.push('hidden-row');
  if (opts.active) classes.push('active');
  const btn = isHidden
    ? `<button class="hide-btn" data-toggle-hide="${escapeHtml(opts.scope)}|${escapeHtml(opts.key)}" title="Unhide">↩ unhide</button>`
    : `<button class="hide-btn" data-toggle-hide="${escapeHtml(opts.scope)}|${escapeHtml(opts.key)}" title="Hide from list">\u{1F6AB} hide</button>`;
  const countStr = (opts.count != null) ? `<span class="count">${opts.count}</span>` : '';
  return `<div class="${classes.join(' ')}" data-key="${escapeHtml(opts.key)}">
    <span>${escapeHtml(opts.label)}</span>${countStr}${btn}
  </div>`;
}

// --------- Clipboard helper for the caption Copy buttons ----------
function copyToClipboard(text, btn) {
  const done = () => {
    if (!btn) return;
    const old = btn.textContent;
    btn.textContent = '✓ copied';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = old; btn.classList.remove('ok'); }, 1500);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallback());
  } else { fallback(); }
  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch (_) {}
    document.body.removeChild(ta);
  }
}
// Delegate clicks inside the lightbox caption (PhotoSwipe re-creates the DOM each open).
document.addEventListener('click', (ev) => {
  const t = ev.target.closest('[data-copy]');
  if (t) {
    ev.preventDefault();
    copyToClipboard(t.getAttribute('data-copy'), t);
  }
});

// --------- Lightbox factory (one per tab kind) ----------
const _lightboxes = {};
function getLightbox(kind, captionRenderer) {
  if (_lightboxes[kind]) return _lightboxes[kind];
  const lb = new PhotoSwipeLightbox({
    pswpModule: PhotoSwipe,
    bgOpacity: 0.92,
    showHideAnimationType: 'fade',
    // Generous padding all around — Dynamic Caption ('aside' mode) auto-positions
    // itself next to the image without overlap and switches to 'below' when there's
    // not enough horizontal room. We just need to leave breathing room.
    padding: { top: 30, bottom: 30, left: 30, right: 30 },
  });
  new PhotoSwipeDynamicCaption(lb, {
    type: 'aside',
    captionContent: (slide) => captionRenderer(slide.data),
  });
  new DeepZoom(lb, {
    tileSize: 256,
    incrementalZoomButtons: false,
  });
  lb.init();
  _lightboxes[kind] = lb;
  return lb;
}

// --------- Fetch CivitAI preview helper (calls Fooocus API endpoint) ----------
// Only available when the SPA is served via HTTP (i.e. opened from Fooocus).
// In standalone file:// mode the Fetch button is hidden (HAS_FOOOCUS = false).
const HAS_FOOOCUS = (window.location.protocol === 'http:' || window.location.protocol === 'https:');

function fetchCivitaiPreviewBtnHtml(kind, relPath) {
  if (!HAS_FOOOCUS) return '';   // standalone mode — no Fooocus to call
  const k = escapeHtml(kind);
  const r = escapeHtml(relPath);
  return `<button class="fetch-civitai-btn" data-fetch-kind="${k}" data-fetch-rel="${r}"
            title="Download the top CivitAI image for this model and save it as a sidecar preview.">
            🌐 Fetch from CivitAI
          </button>`;
}

async function fetchCivitaiPreview(kind, relPath, btn) {
  if (!btn) return;
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ Fetching from CivitAI…';
  // Try Gradio's /run/<api_name> first, fall back to /api/<api_name>.
  const body = JSON.stringify({ data: [kind, relPath] });
  const opts = { method: 'POST', headers: { 'Content-Type': 'application/json' }, body };
  let result = null;
  for (const url of ['/run/ab_fetch_preview', '/api/ab_fetch_preview']) {
    try {
      const resp = await fetch(url, opts);
      if (!resp.ok) continue;
      const json = await resp.json();
      // Gradio v3.x returns { data: [output1, ...] }, sometimes nested.
      if (json && Array.isArray(json.data) && json.data.length) {
        result = json.data[0];
      } else if (json && typeof json === 'object' && 'success' in json) {
        result = json;
      }
      if (result) break;
    } catch (e) { /* try next */ }
  }
  if (!result) {
    btn.textContent = '✗ Network error — see console';
    btn.style.background = 'rgba(200,60,60,0.4)';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ''; }, 4000);
    return;
  }
  if (!result.success) {
    btn.textContent = '✗ ' + (result.message || 'Failed');
    btn.style.background = 'rgba(200,60,60,0.4)';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ''; }, 4000);
    return;
  }
  btn.textContent = '✓ ' + (result.message || 'Fetched') + ' — reloading…';
  btn.style.background = 'rgba(78,205,196,0.4)';
  setTimeout(() => { window.location.reload(); }, 1200);
}

// Delegated click handler — fires for any button with data-fetch-kind, even
// when PhotoSwipe rebuilds the caption DOM between slides.
document.addEventListener('click', (ev) => {
  const t = ev.target.closest('[data-fetch-kind]');
  if (!t) return;
  ev.preventDefault(); ev.stopPropagation();
  fetchCivitaiPreview(t.getAttribute('data-fetch-kind'), t.getAttribute('data-fetch-rel'), t);
});

// --------- Caption renderers per tab ----------
function captionImage(d) {
  const m = d._fooocusMeta || {};
  const rows = [];
  const get = k => m[k] != null ? String(m[k]) : null;
  const pushRow = (k, v) => { if (v != null && v !== '') rows.push({k, v}); };
  pushRow('Sampler', get('sampler') || get('sampler_name'));
  pushRow('Scheduler', get('scheduler') || get('scheduler_name'));
  pushRow('CFG',     get('guidance_scale') || get('cfg_scale') || get('cfg'));
  pushRow('Steps',   get('steps'));
  pushRow('Seed',    get('seed'));
  pushRow('Resolution', get('resolution') || (d.width && d.height ? `${d.width}x${d.height}` : null));
  pushRow('Model',   get('base_model') || get('model'));
  pushRow('Refiner', get('refiner_model'));
  pushRow('LoRAs',   get('loras'));
  pushRow('Created', d._createdAt);

  const promptText = get('prompt') || get('positive') || '';
  const negativeText = get('negative_prompt') || get('negative') || '';

  const allParamsText = JSON.stringify(m, null, 2);

  return `<h2>${escapeHtml(d._filename || 'image')}</h2>
    ${promptText ? `<div class="meta-row"><span class="k">Prompt</span><div class="v">${escapeHtml(promptText)}</div></div>` : ''}
    ${negativeText ? `<div class="meta-row"><span class="k">Negative</span><div class="v">${escapeHtml(negativeText)}</div></div>` : ''}
    ${rows.map(r => `<div class="meta-row"><span class="k">${escapeHtml(r.k)}</span><span class="v">${escapeHtml(r.v)}</span></div>`).join('')}
    <div class="copy-row">
      ${promptText ? `<button data-copy="${escapeHtml(promptText)}">📋 Prompt</button>` : ''}
      ${negativeText ? `<button data-copy="${escapeHtml(negativeText)}">📋 Negative</button>` : ''}
      <button data-copy="${escapeHtml(allParamsText)}">📋 All params (JSON)</button>
    </div>`;
}
function captionLora(d) {
  const it = d._item || {};
  const triggers = (it.trigger_words || []).join(', ');
  const fetchBtn = (it.preview_kind === 'placeholder') ? fetchCivitaiPreviewBtnHtml('loras', it.rel_path) : '';
  return `<h2>${escapeHtml(it.filename)}</h2>
    <div class="meta-row"><span class="k">Path</span><span class="v">${escapeHtml(it.rel_path)}</span></div>
    <div class="meta-row"><span class="k">Size</span><span class="v">${fmtBytes(it.size_bytes)}</span></div>
    <div class="meta-row"><span class="k">Modified</span><span class="v">${escapeHtml(it.modified_at || '')}</span></div>
    ${triggers ? `<div class="meta-row"><span class="k">Triggers</span><div class="v"><code class="triggers">${escapeHtml(triggers)}</code></div></div>` : '<div class="meta-row"><span class="k">Triggers</span><span class="v" style="opacity:.6">— none —</span></div>'}
    <div class="copy-row">
      ${fetchBtn}
      ${triggers ? `<button data-copy="${escapeHtml(triggers)}">📋 Copy triggers</button>` : ''}
      <button data-copy="${escapeHtml(it.filename)}">📋 Copy filename</button>
      ${it.civitai_url ? `<a href="${escapeHtml(it.civitai_url)}" target="_blank">🔗 Open on CivitAI</a>` : ''}
    </div>`;
}
function captionCheckpoint(d) {
  const it = d._item || {};
  const c = it.civitai_consensus || {};
  const consensusRows = Object.keys(c).length
    ? `<div class="meta-row"><span class="k">Sampler</span><span class="v">${escapeHtml(c.sampler || '?')}</span></div>
       <div class="meta-row"><span class="k">CFG</span><span class="v">${escapeHtml(String(c.cfg ?? '?'))}</span></div>
       <div class="meta-row"><span class="k">Steps</span><span class="v">${escapeHtml(String(c.steps ?? '?'))}</span></div>
       <div class="meta-row"><span class="k">Clip skip</span><span class="v">${escapeHtml(String(c.clip_skip ?? '?'))}</span></div>
       <div class="meta-row"><span class="k">Top res</span><span class="v">${escapeHtml(c.top_resolution || '?')}</span></div>`
    : '<div class="meta-row"><span class="k">Consensus</span><span class="v" style="opacity:.6">— not in cache (use CivitAI panel in Fooocus) —</span></div>';
  const consensusJson = JSON.stringify(c, null, 2);
  const fetchBtn = (it.preview_kind === 'placeholder') ? fetchCivitaiPreviewBtnHtml('checkpoints', it.rel_path) : '';
  return `<h2>${escapeHtml(it.filename)}</h2>
    <div class="meta-row"><span class="k">Path</span><span class="v">${escapeHtml(it.rel_path)}</span></div>
    <div class="meta-row"><span class="k">Size</span><span class="v">${fmtBytes(it.size_bytes)}</span></div>
    ${it.base_model ? `<div class="meta-row"><span class="k">Base</span><span class="v">${escapeHtml(it.base_model)}</span></div>` : ''}
    ${consensusRows}
    <div class="copy-row">
      ${fetchBtn}
      ${Object.keys(c).length ? `<button data-copy="${escapeHtml(consensusJson)}">📋 Copy consensus (JSON)</button>` : ''}
      <button data-copy="${escapeHtml(it.filename)}">📋 Copy filename</button>
      ${it.civitai_url ? `<a href="${escapeHtml(it.civitai_url)}" target="_blank">🔗 Open on CivitAI</a>` : ''}
    </div>`;
}
function captionEmbedding(d) {
  const it = d._item || {};
  const triggers = (it.trigger_words || []).join(', ');
  const embToken = `(embedding:${it.trigger}:1.0)`;
  const fetchBtn = (it.preview_kind === 'placeholder') ? fetchCivitaiPreviewBtnHtml('embeddings', it.rel_path) : '';
  return `<h2>${escapeHtml(it.filename)}</h2>
    <div class="meta-row"><span class="k">Trigger</span><div class="v"><code class="triggers">${escapeHtml(it.trigger)}</code></div></div>
    <div class="meta-row"><span class="k">Likely use</span><span class="v">${it.is_negative_hint ? '<b style="color:#ff8a8a">negative prompt</b>' : 'positive prompt'}</span></div>
    <div class="meta-row"><span class="k">Path</span><span class="v">${escapeHtml(it.rel_path)}</span></div>
    <div class="meta-row"><span class="k">Size</span><span class="v">${fmtBytes(it.size_bytes)}</span></div>
    ${triggers ? `<div class="meta-row"><span class="k">Extra triggers</span><div class="v"><code class="triggers">${escapeHtml(triggers)}</code></div></div>` : ''}
    <div class="copy-row">
      ${fetchBtn}
      <button data-copy="${escapeHtml(embToken)}">📋 ${escapeHtml(embToken)}</button>
      <button data-copy="${escapeHtml(it.trigger)}">📋 Trigger only</button>
      ${it.civitai_url ? `<a href="${escapeHtml(it.civitai_url)}" target="_blank">🔗 Open on CivitAI</a>` : ''}
    </div>`;
}

// --------- Image dimension probe (used when manifest doesn't have width/height) ----------
const _dimCache = new Map();
function probeDimensions(url) {
  if (_dimCache.has(url)) return Promise.resolve(_dimCache.get(url));
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => { const d = {w: img.naturalWidth, h: img.naturalHeight}; _dimCache.set(url, d); resolve(d); };
    img.onerror = () => { const d = {w: 1024, h: 1024}; _dimCache.set(url, d); resolve(d); };
    img.src = url;
  });
}

// --------- OUTPUTS TAB ----------
const Outputs = {
  days: [], today: null, activeDate: null, _slides: [],
  async init() {
    $sidebarTitle.textContent = 'Days';
    const idx = await fetchJson('./_index/days.json');
    if (!idx) {
      renderEmpty($sidebarList, 'No <code>_index/days.json</code>.');
      renderEmpty($main, 'Asset Browser has not built its outputs index yet.<br><br>'
        + 'In Fooocus go to <b>Advanced → 🖼️ Asset Browser</b> and click '
        + '<code>🔄 Reindex everything now</code>, or generate a new image.');
      return;
    }
    this.days = idx.days || []; this.today = idx.today;
    this.renderSidebar();
    const initial = this.days.find(d => d.date === this.today) || this.days[0];
    if (initial) this.loadDay(initial.date);
    else renderEmpty($main, '<b>No days yet.</b>');
  },
  renderSidebar() {
    if (this.days.length === 0) { renderEmpty($sidebarList, 'No days indexed.'); return; }
    const html = this.days.map(d => sidebarItemHtml({
      scope: 'outputs:days', key: d.date, label: d.date, count: d.count,
      classes: d.date === this.today ? ['today'] : [],
      active: d.date === this.activeDate,
    })).join('');
    $sidebarList.innerHTML = html || '<div class="empty">All days hidden — click 👁️ Hidden in the header.</div>';
    $sidebarList.querySelectorAll('.item').forEach(el => {
      el.addEventListener('click', (ev) => {
        if (ev.target.closest('.hide-btn')) return;   // handled by global delegate
        this.loadDay(el.dataset.key);
      });
    });
  },
  async loadDay(date) {
    this.activeDate = date;
    this.renderSidebar();
    const manifest = await fetchJson(`./${date}/manifest.json`);
    if (!manifest || !manifest.images || manifest.images.length === 0) {
      renderEmpty($main, `No manifest for ${date} yet.`); return;
    }
    // Prepare slides for the lightbox.
    this._slides = await Promise.all(manifest.images.map(async (img) => {
      let w = img.width, h = img.height;
      if (!w || !h) { const d = await probeDimensions(`./${date}/${img.src}`); w = d.w; h = d.h; }
      return {
        src: `./${date}/${encodeURIComponent(img.src)}`,
        msrc: img.thumb ? `./${date}/${encodeURIComponent(img.thumb)}` : undefined,
        width: w, height: h,
        _filename: img.src,
        _createdAt: img.created_at,
        _fooocusMeta: img.metadata || {},
      };
    }));
    const lb = getLightbox('outputs', captionImage);
    lb.options.dataSource = this._slides;
    $main.innerHTML = `<div class="grid">${manifest.images.map((img, i) => {
      const thumb = img.thumb || img.src;
      return `<div class="card" data-idx="${i}" title="${escapeHtml(img.src)}">
        <img loading="lazy" src="./${date}/${encodeURIComponent(thumb)}" alt="">
        <div class="label">${escapeHtml(img.src)}</div>
      </div>`;
    }).join('')}</div>`;
    $main.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => lb.loadAndOpen(parseInt(el.dataset.idx, 10)));
    });
    $footer.textContent = `${date} — ${fmtCount(manifest.images.length, 'image')}`;
  },
};

// --------- MODELS TABS (loras / checkpoints / embeddings) ----------
function buildModelsTab(kind, opts) {
  return {
    kind, file: `./_index/${kind}.json`,
    items: [], subfolders: [], activeSubfolder: '__all__', _slides: [],
    async init() {
      $sidebarTitle.textContent = opts.sidebarTitle;
      const idx = await fetchJson(this.file);
      if (!idx || !idx.items || idx.items.length === 0) {
        renderEmpty($sidebarList, `No <code>${kind}.json</code> yet.`);
        renderEmpty($main, `<b>${opts.emptyTitle}</b><br><br>`
          + 'Click <code>🔄 Reindex everything now</code> in Fooocus → '
          + 'Advanced → 🖼️ Asset Browser to scan your <code>'
          + opts.modelsDir + '</code> folder.');
        return;
      }
      this.items = idx.items;
      this.subfolders = this.computeSubfolders();
      this.renderSidebar();
      this.renderGrid();
      $footer.textContent = `${fmtCount(this.items.length, opts.unit)} indexed at ${idx.generated_at || '?'}`;
    },
    computeSubfolders() {
      const counts = new Map();
      for (const it of this.items) {
        const f = it.subfolder || '.';
        counts.set(f, (counts.get(f) || 0) + 1);
      }
      return Array.from(counts.entries())
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => a.name.localeCompare(b.name));
    },
    renderSidebar() {
      const total = this.items.length;
      const scope = `${this.kind}:subfolders`;
      // 'All' is always shown — it's a virtual entry, can't be hidden.
      const head = `<div class="item${this.activeSubfolder === '__all__' ? ' active' : ''}" data-sub="__all__">
          <span>All</span><span class="count">${total}</span></div>`;
      const rest = this.subfolders.map(sf => sidebarItemHtml({
        scope, key: sf.name,
        label: sf.name === '.' ? '(root)' : sf.name,
        count: sf.count,
        active: this.activeSubfolder === sf.name,
      })).join('');
      $sidebarList.innerHTML = head + rest;
      $sidebarList.querySelectorAll('.item').forEach(el => {
        el.addEventListener('click', (ev) => {
          if (ev.target.closest('.hide-btn')) return;
          // 'All' uses data-sub, sub-folders use data-key (from sidebarItemHtml).
          const sub = el.dataset.sub != null ? el.dataset.sub : el.dataset.key;
          this.activeSubfolder = sub;
          this.renderSidebar(); this.renderGrid();
        });
      });
    },
    async renderGrid() {
      const scope = `${this.kind}:subfolders`;
      // Filter out items whose subfolder is hidden — unless 'show hidden' is on
      // OR the active subfolder is exactly that hidden one (user navigated to it).
      const subfolderVisible = (sf) => {
        if (State.showHidden) return true;
        if (this.activeSubfolder !== '__all__' && this.activeSubfolder === sf) return true;
        return !State.isHidden(scope, sf);
      };
      const filtered = (this.activeSubfolder === '__all__'
        ? this.items.filter(it => subfolderVisible(it.subfolder || '.'))
        : this.items.filter(it => (it.subfolder || '.') === this.activeSubfolder));
      if (filtered.length === 0) { renderEmpty($main, 'Nothing to show here.'); return; }

      // Slides for lightbox: prefer the full-resolution preview_full (sidecar
      // copy at native size) and fall back to the 256x256 thumb if missing.
      // Probe dimensions async so PhotoSwipe centres / zooms correctly.
      this._slides = await Promise.all(filtered.map(async (it) => {
        const fullSrc = it.preview_full || it.preview;
        const url = fullSrc ? `./${fullSrc}` : '';
        let w = 512, h = 512;
        if (url) {
          try { const d = await probeDimensions(url); w = d.w; h = d.h; } catch (_) {}
        }
        return {
          src: url,
          msrc: it.preview ? `./${it.preview}` : undefined,
          width: w, height: h,
          _item: it,
        };
      }));
      const lb = getLightbox(this.kind, opts.captionRenderer);
      lb.options.dataSource = this._slides;

      $main.innerHTML = `<div class="grid">${filtered.map((it, i) => this.renderCard(it, i)).join('')}</div>`;
      $main.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', () => lb.loadAndOpen(parseInt(el.dataset.idx, 10)));
      });
    },
    renderCard(it, i) {
      const previewSrc = it.preview ? `./${it.preview}` : '';
      const cls = ['card']; if (it.preview_kind === 'placeholder') cls.push('placeholder');
      if (it.is_negative_hint) cls.push('negative');
      const badges = [];
      if (it.trigger_words && it.trigger_words.length)
        badges.push(`<span title="${escapeHtml(it.trigger_words.join(', '))}">⚡ ${it.trigger_words.length}</span>`);
      if (it.civitai_url) badges.push(`<span title="On CivitAI">🔗</span>`);
      if (it.is_negative_hint) badges.push(`<span title="Likely a negative-prompt embedding">−</span>`);
      if (it.civitai_consensus) badges.push(`<span title="Has CivitAI consensus settings">📊</span>`);
      const label = it.filename;
      const titleAttr = `${it.rel_path} · ${fmtBytes(it.size_bytes)}`
        + (it.trigger_words && it.trigger_words.length ? `\nTriggers: ${it.trigger_words.join(', ')}` : '');
      return `<div class="${cls.join(' ')}" data-idx="${i}" title="${escapeHtml(titleAttr)}">
        ${previewSrc
          ? `<img loading="lazy" src="${escapeHtml(previewSrc)}" alt="">`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#444">no preview</div>`}
        ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
        <div class="label">${escapeHtml(label)}</div>
      </div>`;
    },
  };
}

const tabs = {
  outputs: Outputs,
  loras: buildModelsTab('loras', {
    sidebarTitle: 'Subfolders', emptyTitle: 'No LoRAs indexed',
    modelsDir: 'models/loras/', unit: 'LoRA',
    captionRenderer: captionLora,
  }),
  checkpoints: buildModelsTab('checkpoints', {
    sidebarTitle: 'Subfolders', emptyTitle: 'No checkpoints indexed',
    modelsDir: 'models/checkpoints/', unit: 'checkpoint',
    captionRenderer: captionCheckpoint,
  }),
  embeddings: buildModelsTab('embeddings', {
    sidebarTitle: 'Subfolders', emptyTitle: 'No embeddings indexed',
    modelsDir: 'models/embeddings/', unit: 'embedding',
    captionRenderer: captionEmbedding,
  }),
};

function setActiveTab(name) {
  $tabs.querySelectorAll('button').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === name));
  if (window.location.hash.replace('#', '') !== name) {
    history.replaceState(null, '', '#' + name);
  }
  if (tabs[name]) tabs[name].init();
}

$tabs.querySelectorAll('button').forEach(b => {
  if (b.disabled) return;
  b.addEventListener('click', () => setActiveTab(b.dataset.tab));
});

// =================== Header toggles + delegated hide/unhide ===================
let _activeTabName = 'outputs';
function _reInitActiveTab() { if (tabs[_activeTabName]) tabs[_activeTabName].init(); }

document.getElementById('btn-blur').addEventListener('click', () => {
  // Cycle: default -> opposite override -> back to default.
  const cur = State.effectiveBlur();
  const ovr = localStorage.getItem(LS_BLUR_OVR);
  if (ovr === null) {
    State.setBlurOverride(!State.spaSettings.blur_thumbnails);
  } else {
    State.setBlurOverride(null);
    State.applyBlur();
  }
});
document.getElementById('btn-show-hidden').addEventListener('click', () => {
  State.showHidden = !State.showHidden;
  refreshHeaderToggles();
  _reInitActiveTab();   // re-render the current tab so hidden items come back / disappear
});

// Delegated click for hide/unhide buttons in the sidebar.
document.addEventListener('click', (ev) => {
  const t = ev.target.closest('[data-toggle-hide]');
  if (!t) return;
  ev.preventDefault();
  ev.stopPropagation();
  const [scope, key] = t.getAttribute('data-toggle-hide').split('|');
  State.toggleHidden(scope, key);
  refreshHeaderToggles();
  _reInitActiveTab();
});

// Wrap setActiveTab to remember the active tab name (so re-renders go to the right place).
const _origSetActiveTab = setActiveTab;
setActiveTab = function(name) {
  _activeTabName = name;
  return _origSetActiveTab(name);
};

// =================== Boot ===================
(async () => {
  // Load SPA-side settings (blur default written by gallery_writer.ensure_gallery_assets).
  const s = await fetchJson('./_index/spa_settings.json');
  if (s && typeof s === 'object') State.spaSettings = Object.assign(State.spaSettings, s);
  State.applyBlur();
  refreshHeaderToggles();

  // Initial tab from URL hash, fallback to outputs.
  const initial = (window.location.hash || '#outputs').replace('#', '');
  setActiveTab(tabs[initial] ? initial : 'outputs');
})();
</script>
